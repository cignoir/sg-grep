name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: windows-latest

    permissions:
      contents: write

    env:
      RUSTC_WRAPPER: sccache

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7
        env:
          SCCACHE_GHA_ENABLED: "true"

      - name: Restore Cargo registry cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Bundle Tauri app
        run: npx tauri build --no-sign

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

      - name: Sign installer
        run: |
          $exe = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          Write-Host "Signing: $($exe.FullName)"
          npx tauri signer sign $exe.FullName
          Get-ChildItem "src-tauri/target/release/bundle/nsis/" | Format-Table Name, Length
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Generate latest.json
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $nsis_dir = "src-tauri/target/release/bundle/nsis"
          $exe = Get-ChildItem "$nsis_dir/*.exe" | Select-Object -First 1
          $sig_file = Get-ChildItem "$nsis_dir/*.sig" | Select-Object -First 1
          if (-not $exe) { Write-Error "No installer found"; exit 1 }
          if (-not $sig_file) { Write-Error "No sig file found"; exit 1 }
          $sig = Get-Content $sig_file.FullName -Raw
          $date = Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ"
          $json = @{
            version = "v$version"
            notes = "Release v$version"
            pub_date = $date
            platforms = @{
              "windows-x86_64" = @{
                signature = $sig.Trim()
                url = "https://github.com/cignoir/sg-grep/releases/download/v$version/$($exe.Name)"
              }
            }
          } | ConvertTo-Json -Depth 4
          $json | Out-File -Encoding utf8 latest.json
          Write-Host "Generated latest.json for v$version"
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            latest.json
          generate_release_notes: true

      - name: Save Cargo registry cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
